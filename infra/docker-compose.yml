version: '3.8'

services:
  # Relational Database
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: friday
      POSTGRES_PASSWORD: friday_password
      POSTGRES_DB: friday_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friday -d friday_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Document Database
  mongo:
    image: mongo:6
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root_password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Cache & PubSub
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: friday
      RABBITMQ_DEFAULT_PASS: friday_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # Search Engine
  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: always
    environment:
      MEILI_MASTER_KEY: friday_master_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  # Object Storage
  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # LLM Runner
  ollama:
    image: ollama/ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Tracing
  langfuse-server:
    image: langfuse/langfuse:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3100:3000"  # Use 3100 to avoid conflict with Next.js on 3000
    environment:
      - DATABASE_URL=postgresql://friday:friday_password@postgres:5432/langfuse
      - NEXTAUTH_SECRET=friday_langfuse_secret
      - SALT=friday_langfuse_salt
      - NEXTAUTH_URL=http://localhost:3100
      - TELEMETRY_ENABLED=false

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib
    restart: always
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./otel-collector.yml:/etc/otel-collector.yml
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP http receiver

  # Metrics Storage
  prometheus:
    image: prom/prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # Metrics Dashboard
  grafana:
    image: grafana/grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  # Distributed Tracing UI
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: always
    ports:
      - "16686:16686"
      - "14250:14250"

  # Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  meili_data:
  minio_data:
  ollama_data:
  grafana_data:
  prometheus_data:
